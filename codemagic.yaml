workflows:
  ios-workflow:
    name: iOS Workflow

    environment:
      xcode: latest

    scripts:
      - name: Install Tuist
        script: |
          curl -Ls https://install.tuist.io | bash

      - name: Generate Project
        script: |
          tuist generate

      - name: Build IPA
        script: |
          xcodebuild archive \
          -workspace BudgetTracker.xcworkspace \
          -scheme BudgetTracker \
          -archivePath build/BudgetTracker.xcarchive

    artifacts:
      - build/**/*.ipa