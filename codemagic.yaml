workflows:
  ios-workflow:
    name: iOS Workflow

    environment:
      xcode: latest
      groups:
        - default

    scripts:
      - name: Install Tuist
        script: |
          curl -fsSL https://mise.run | sh
          export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
          mise install tuist@latest
          mise use -g tuist@latest
          tuist version

      - name: Configure Median Package Registry
        script: |
          swift package-registry set --global https://packages.gonative.io
          swift package-registry login https://packages.gonative.io --token "$GITHUB_TOKEN"

      - name: Generate Project
        script: |
          export PATH="$HOME/.local/bin:$HOME/.local/share/mise/shims:$PATH"
          tuist generate

      - name: Build IPA
        script: |
          xcodebuild archive \
          -workspace MedianIOS.xcworkspace \
          -scheme MedianIOS \
          -sdk iphoneos \
          -configuration Release \
          -archivePath build/MedianIOS.xcarchive

    artifacts:
      - build/**/*.ipa
      - build/**/*.xcarchive